<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ezan Vakitleri</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f5f5f5;
}

/* NAVBAR */
nav{
    background:#0f172a;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:20px;
    font-weight:bold;
    color:#38bdf8;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:20px;
}

nav ul li a{
    color:white;
    text-decoration:none;
}

/* BAŞLIK */
.header{
    text-align:center;
    padding:30px;
}

.header h1{
    color:#0f172a;
}

/* TABLO */
.table-container{
    display:flex;
    justify-content:center;
    padding:20px;
}

table{
    width:90%;
    max-width:600px;
    border-collapse:collapse;
    background:white;
    border-radius:10px;
    overflow:hidden;
}

th, td{
    padding:12px;
    text-align:center;
}

th{
    background:#0f172a;
    color:white;
}

tr:nth-child(even){
    background:#f0f0f0;
}

/* LOADING */
.loading{
    text-align:center;
    margin-top:20px;
}
/* 📱 MOBILE */
@media (max-width: 768px) {

    nav{
        flex-direction: column;
        align-items: flex-start;
    }

    nav ul{
        flex-direction: column;
        width: 100%;
        margin-top: 10px;
    }

    nav ul li{
        margin: 5px 0;
    }

    .header h1{
        font-size: 22px;
    }

    .container{
        grid-template-columns: 1fr;
    }

    .btn{
        display:block;
        margin:8px 0;
    }
}
</style>
</head>

<body>

<nav>
    <div class="logo">🕌 Marmaris Camileri</div>
    <ul>
        <li><a href="index.html">Ana Sayfa</a></li>
        <li><a href="camiler.html">Camiler</a></li>
        <li><a href="etkinlikler.html">Etkinlikler</a></li>
        <li><a href="ezan.html">Ezan Vakitleri</a></li>
         <li><a href="faydali-linkler.html">Faydalı Linkler</a></li>
        <li><a href="hakkimizda.html">Hakkımızda</a></li>
         <li><a href="iletişim.html">İletişim</a></li>
         <li><a href="bilgi.html">İlçe Bilgi ve Hava Durumu</a></li>
         <li><a href="reklam.html">Reklam</a></li>
        <li><a href="sponsorlar.html">Sponsorlar</a></li>
    </ul>
</nav>

<div class="header">
    <h1>Ezan Vakitleri (Marmaris)</h1>
</div>

<div class="loading" id="loading">Yükleniyor...</div>

<div class="table-container" style="display:none;" id="tableBox">
<table>
    <tr>
        <th>Vakit</th>
        <th>Saat</th>
    </tr>
    <tr><td>İmsak</td><td id="imsak"></td></tr>
    <tr><td>Güneş</td><td id="gunes"></td></tr>
    <tr><td>Öğle</td><td id="ogle"></td></tr>
    <tr><td>İkindi</td><td id="ikindi"></td></tr>
    <tr><td>Akşam</td><td id="aksam"></td></tr>
    <tr><td>Yatsı</td><td id="yatsi"></td></tr>
</table>
</div>

<script>
// API'den veri çekme
fetch("https://api.aladhan.com/v1/timingsByCity?city=Marmaris&country=Turkey&method=13")
.then(res => res.json())
.then(data => {
    let v = data.data.timings;

    document.getElementById("imsak").innerText = v.Fajr;
    document.getElementById("gunes").innerText = v.Sunrise;
    document.getElementById("ogle").innerText = v.Dhuhr;
    document.getElementById("ikindi").innerText = v.Asr;
    document.getElementById("aksam").innerText = v.Maghrib;
    document.getElementById("yatsi").innerText = v.Isha;

    document.getElementById("loading").style.display = "none";
    document.getElementById("tableBox").style.display = "flex";
})
.catch(() => {
    document.getElementById("loading").innerText = "Veri alınamadı!";
});
</script>

</body>
</html>
