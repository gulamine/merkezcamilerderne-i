<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0f172a;
    color:white;
}

/* NAV */
nav{
    background:#020617;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    margin:0 10px;
    text-decoration:none;
}

/* HERO VIDEO */
.hero{
    position:relative;
    height:80vh;
    overflow:hidden;
}

.hero video{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.overlay h1{
    font-size:30px;
}

/* GALERİ */
.galeri{
    padding:40px;
    text-align:center;
}

.galeri h2{
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
    gap:15px;
}

.grid img{
    width:100%;
    border-radius:10px;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    background:#020617;
    margin-top:20px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <a href="index.html">Ana Sayfa</a>
    <a href="banner.html">Banner</a>
    <a href="camiler.html">Camiler</a>
            <a href="etkinlikler.html">Etkinlikler</a>
            <a href="ezan.html">Ezan Vakitleri</a>
            <a href="faydali-dini-linkler.html">faydali-dini-Linkler</a>
            <a href="faydali-linkler.html">Faydalı Linkler</a>
            <a href="hakkimizda.html">Hakkımızda</a>
            <a href="iletisim.html">İletişim</a>
            <a href="reklam.html">Reklam</a>
            <a href="sponsorlar.html">Sponsorlar</a>
</nav>

<!-- VIDEO BANNER -->
<section class="hero">

    <video autoplay muted loop playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

    <div class="overlay">
        <h1>Faaliyetler & Etkinlikler</h1>
        <p>Camilerimizin yaptığı çalışmalar</p>
    </div>

</section>

<!-- GALERİ -->
<section class="galeri">

    <h2>Banner</h2>

    <div class="grid">
        <img src="img1.jpg">
        <img src="img2.jpg">
        <img src="img3.jpg">
        <img src="img4.jpg">
        <img src="img5.jpg">
        <img src="img6.jpg">
    </div>

</section>

<!-- FOOTER -->
<footer>
© 2026 Marmaris Camileri
</footer>

</body>
</html>
